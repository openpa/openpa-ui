tagImage: "xxx"

deployments:
  - serviceName: "agent-ui"
    replicaCount: 1
    maxSurge: 1
    maxUnavailable: 0
    podAnnotations: 
      traffic.sidecar.istio.io/excludeOutboundPorts: 4222,19092
    imagePullSecrets:
      - name: regcred
    serviceAccount: {}
    podSecurityContext: {}
    securityContext: {}
    repository: 905418372464.dkr.ecr.ap-southeast-1.amazonaws.com/stg/agent-ui
    pullPolicy: Always
    #tag: "1a2b3c" -> If you have specific tag then add this, else remove
    containerCommand: ""
    containerArgs: ""
    ports:
      - containerPort: 8000
        name: "http"
    resources:
      limits:
        cpu: 200m
        memory: 300Mi
      requests:
        cpu: 100m
        memory: 200Mi
    nodeSelector: {}
    tolerations:
      - key: "karpenter.sh/nodepool"
        operator: "Equal"
        value: "default-spot"
        effect: "NoSchedule"
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: karpenter.sh/nodepool
                  operator: In
                  values:
                    - "default-spot"
    istio: true
    readinessProbe:
      httpGet:
        path: /test  # Đảm bảo endpoint này chính xác
        port: 8000  # Sử dụng cổng thực tế của ứng dụng
      initialDelaySeconds: 30  # Chờ 30 giây trước khi bắt đầu kiểm tra
      periodSeconds: 10  # Kiểm tra mỗi 10 giây
      successThreshold: 1  # Cần 1 lần thành công để coi là sẵn sàng
      failureThreshold: 18  # Cho phép tối đa 18 lần thất bại (18 * 10s = 180s = 3 phút)
      timeoutSeconds: 5  # Thời gian chờ cho mỗi lần kiểm tra
    envFrom:
      - configMapRef:
          name: agent-ui
            
services:
  - serviceName: "agent-ui"
    type: ClusterIP
    ports:
      - name: http
        port: 80
        protocol: TCP
        targetPort: 8000
ingresses:
  - serviceName: "agent-ui"
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      kubernetes.io/tls-acme: "true"
      # kubernetes.io/ingress.class: nginx
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-body-size: 100m
      nginx.org/client-max-body-size: 100m
      nginx.org/proxy-read-timeout: 120s
      nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
      # nginx.ingress.kubernetes.io/backend-protocol: GRPC
      nginx.ingress.kubernetes.io/http2-max-concurrent-streams: "100"
      nginx.ingress.kubernetes.io/limit-rps: "100"
    ingressClassName: nginx
    rules:
      - host: staging.agent-ui.iviet.com
        http:
          paths:
            - backend:
                service:
                  name: "agent-ui"
                  port:
                    number: 80
              path: /
              pathType: Prefix
    tls:
      - hosts:
          - staging.agent-ui.iviet.com
        secretName: staging-agent-ui-tls
autoscales:
  - serviceName: "agent-ui"
    type: cpu
    threshold: 80
    minReplica: 1
    maxReplica: 1
