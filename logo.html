<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Port2Internet - Brand Assets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .grid-bg {
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

    <div class="max-w-5xl mx-auto p-8">
        <header class="mb-12 text-center">
            <h1 class="text-3xl font-bold mb-2 text-slate-900">Port2Internet</h1>
            <p class="text-gray-500">Brand Identity & Logo Assets</p>
        </header>

        <!-- Main Logo Showcase -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden mb-12">
            <div class="p-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                <h2 class="font-semibold text-gray-700">Primary Logo (Horizontal)</h2>
                <span class="text-xs bg-blue-100 text-blue-800 px-2 py-1 rounded">Recommended</span>
            </div>
            <div class="p-16 flex justify-center items-center grid-bg">
                <!-- SVG START -->
                <svg width="400" height="100" viewBox="0 0 400 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    
                    <!-- Vertical Icon Stack Group (Left Side) -->
                    <g transform="translate(10, 0)">
                        <!-- Top: Cloud -->
                        <g transform="translate(14, 10) scale(1.4)">
                            <path fill="#3B82F6" d="M6.5 20q-2.275 0-3.887-1.575T1 14.575q0-1.95 1.175-3.475T5.25 9.15q.625-2.3 2.5-3.725T12 4q2.925 0 4.963 2.038T19 11q1.725.2 2.863 1.488T23 15.5q0 1.875-1.312 3.188T18.5 20zm0-2h12q1.05 0 1.775-.725T21 15.5t-.725-1.775T18.5 13H17v-2q0-2.075-1.463-3.538T12 6T8.463 7.463T7 11h-.5q-1.45 0-2.475 1.025T3 14.5t1.025 2.475T6.5 18m5.5-6"/>
                        </g>

                        <!-- Middle: Small Text -->
                        <!-- Adjusted y from 53 to 46 for tighter spacing -->
                        <text x="31" y="46" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="8" fill="#64748B" letter-spacing="0.2">
                            Port2Internet
                        </text>

                        <!-- Bottom: Line/Cable -->
                        <!-- Adjusted translate y from 60 to 50 for tighter spacing -->
                        <g transform="translate(14, 50) scale(1.4)">
                             <path fill="#1E293B" d="M5 20.5q-.213 0-.356-.144T4.5 20v-1.115h-1v-3.5q0-.213.144-.357T4 14.884h1.5V7q0-1.458 1.021-2.479T9 3.5t2.479 1.021T12.5 7v10q0 1.056.722 1.778T15 19.5t1.778-.722T17.5 17V9.116H16q-.213 0-.356-.144t-.144-.356v-3.5h1V4q0-.213.144-.356T17 3.5h2q.213 0 .356.144T19.5 4v1.116h1v3.5q0 .212-.144.356T20 9.116h-1.5V17q0 1.458-1.021 2.479T15 20.5t-2.479-1.021T11.5 17V7q0-1.056-.722-1.778T9 4.5t-1.778.722T6.5 7v7.885H8q.213 0 .356.143t.144.356v3.5h-1V20q0 .213-.144.356T7 20.5z"/>
                        </g>
                    </g>

                    <!-- Original Large Brand Text (Right Side) -->
                    <text x="90" y="62" font-family="Inter, sans-serif" font-weight="800" font-size="40" fill="#1E293B" letter-spacing="-1">
                        Port<tspan fill="#3B82F6">2</tspan>Internet
                    </text>
                </svg>
                <!-- SVG END -->
            </div>
            <div class="bg-gray-800 p-12 flex justify-center items-center">
                 <!-- Dark Mode Version -->
                 <svg width="400" height="100" viewBox="0 0 400 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <g transform="translate(10, 0)">
                        <g transform="translate(14, 10) scale(1.4)">
                            <path fill="#3B82F6" d="M6.5 20q-2.275 0-3.887-1.575T1 14.575q0-1.95 1.175-3.475T5.25 9.15q.625-2.3 2.5-3.725T12 4q2.925 0 4.963 2.038T19 11q1.725.2 2.863 1.488T23 15.5q0 1.875-1.312 3.188T18.5 20zm0-2h12q1.05 0 1.775-.725T21 15.5t-.725-1.775T18.5 13H17v-2q0-2.075-1.463-3.538T12 6T8.463 7.463T7 11h-.5q-1.45 0-2.475 1.025T3 14.5t1.025 2.475T6.5 18m5.5-6"/>
                        </g>
                        <text x="31" y="46" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="8" fill="#94A3B8" letter-spacing="0.2">
                            Port2Internet
                        </text>
                        <g transform="translate(14, 50) scale(1.4)">
                             <path fill="#FFFFFF" d="M5 20.5q-.213 0-.356-.144T4.5 20v-1.115h-1v-3.5q0-.213.144-.357T4 14.884h1.5V7q0-1.458 1.021-2.479T9 3.5t2.479 1.021T12.5 7v10q0 1.056.722 1.778T15 19.5t1.778-.722T17.5 17V9.116H16q-.213 0-.356-.144t-.144-.356v-3.5h1V4q0-.213.144-.356T17 3.5h2q.213 0 .356.144T19.5 4v1.116h1v3.5q0 .212-.144.356T20 9.116h-1.5V17q0 1.458-1.021 2.479T15 20.5t-2.479-1.021T11.5 17V7q0-1.056-.722-1.778T9 4.5t-1.778.722T6.5 7v7.885H8q.213 0 .356.143t.144.356v3.5h-1V20q0 .213-.144.356T7 20.5z"/>
                        </g>
                    </g>
                    <text x="90" y="62" font-family="Inter, sans-serif" font-weight="800" font-size="40" fill="#FFFFFF" letter-spacing="-1">
                        Port<tspan fill="#3B82F6">2</tspan>Internet
                    </text>
                </svg>
            </div>
        </div>

        <!-- Variations Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <!-- Icon Only -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8 flex flex-col items-center">
                <h3 class="text-sm font-semibold text-gray-500 mb-6 uppercase tracking-wider">App Icon</h3>
                <div class="w-32 h-32 bg-slate-900 rounded-2xl flex items-center justify-center shadow-lg overflow-hidden">
                    <svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <g transform="translate(26, -10)">
                            <!-- Cloud Top -->
                            <g transform="translate(0, 15) scale(2.0)">
                                <path fill="#3B82F6" d="M6.5 20q-2.275 0-3.887-1.575T1 14.575q0-1.95 1.175-3.475T5.25 9.15q.625-2.3 2.5-3.725T12 4q2.925 0 4.963 2.038T19 11q1.725.2 2.863 1.488T23 15.5q0 1.875-1.312 3.188T18.5 20zm0-2h12q1.05 0 1.775-.725T21 15.5t-.725-1.775T18.5 13H17v-2q0-2.075-1.463-3.538T12 6T8.463 7.463T7 11h-.5q-1.45 0-2.475 1.025T3 14.5t1.025 2.475T6.5 18m5.5-6"/>
                            </g>
                            <!-- Text Middle -->
                            <text x="24" y="62" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="8" fill="#FFFFFF" letter-spacing="0.2">
                                Port2Internet
                            </text>
                            <!-- Line Bottom -->
                            <g transform="translate(0, 56) scale(2.0)">
                                 <path fill="#FFFFFF" d="M5 20.5q-.213 0-.356-.144T4.5 20v-1.115h-1v-3.5q0-.213.144-.357T4 14.884h1.5V7q0-1.458 1.021-2.479T9 3.5t2.479 1.021T12.5 7v10q0 1.056.722 1.778T15 19.5t1.778-.722T17.5 17V9.116H16q-.213 0-.356-.144t-.144-.356v-3.5h1V4q0-.213.144-.356T17 3.5h2q.213 0 .356.144T19.5 4v1.116h1v3.5q0 .212-.144.356T20 9.116h-1.5V17q0 1.458-1.021 2.479T15 20.5t-2.479-1.021T11.5 17V7q0-1.056-.722-1.778T9 4.5t-1.778.722T6.5 7v7.885H8q.213 0 .356.143t.144.356v3.5h-1V20q0 .213-.144.356T7 20.5z"/>
                            </g>
                        </g>
                    </svg>
                </div>
            </div>

            <!-- Color Palette -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
                <h3 class="text-sm font-semibold text-gray-500 mb-6 uppercase tracking-wider">Color Palette</h3>
                <div class="space-y-4">
                    <div class="flex items-center">
                        <div class="w-12 h-12 rounded-lg bg-blue-500 shadow-sm mr-4" style="background-color: #3B82F6;"></div>
                        <div>
                            <p class="font-bold text-gray-900">Electric Blue</p>
                            <p class="text-sm text-gray-500 font-mono">#3B82F6</p>
                            <p class="text-xs text-gray-400">Primary Brand Color</p>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <div class="w-12 h-12 rounded-lg bg-slate-800 shadow-sm mr-4" style="background-color: #1E293B;"></div>
                        <div>
                            <p class="font-bold text-gray-900">Slate Dark</p>
                            <p class="text-sm text-gray-500 font-mono">#1E293B</p>
                            <p class="text-xs text-gray-400">Text & Hardware Elements</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <div class="mt-12 text-center">
            <button onclick="copyToClipboard()" class="bg-gray-900 text-white px-6 py-3 rounded-full font-semibold hover:bg-gray-800 transition-colors shadow-lg flex items-center mx-auto gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                Copy Main SVG Code
            </button>
            <p id="copy-feedback" class="text-green-600 text-sm mt-2 hidden">SVG code copied to clipboard!</p>
        </div>
    </div>

    <script>
        function copyToClipboard() {
            // Updated SVG Code: Vertical Stack (Cloud-Text-Line) + Large Text - Tightened Spacing
            const svgCode = `<svg width="400" height="100" viewBox="0 0 400 100" fill="none" xmlns="http://www.w3.org/2000/svg">
<g transform="translate(10, 0)">
<g transform="translate(14, 10) scale(1.4)">
<path fill="#3B82F6" d="M6.5 20q-2.275 0-3.887-1.575T1 14.575q0-1.95 1.175-3.475T5.25 9.15q.625-2.3 2.5-3.725T12 4q2.925 0 4.963 2.038T19 11q1.725.2 2.863 1.488T23 15.5q0 1.875-1.312 3.188T18.5 20zm0-2h12q1.05 0 1.775-.725T21 15.5t-.725-1.775T18.5 13H17v-2q0-2.075-1.463-3.538T12 6T8.463 7.463T7 11h-.5q-1.45 0-2.475 1.025T3 14.5t1.025 2.475T6.5 18m5.5-6"/>
</g>
<text x="31" y="46" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="8" fill="#64748B" letter-spacing="0.2">
Port2Internet
</text>
<g transform="translate(14, 50) scale(1.4)">
<path fill="#1E293B" d="M5 20.5q-.213 0-.356-.144T4.5 20v-1.115h-1v-3.5q0-.213.144-.357T4 14.884h1.5V7q0-1.458 1.021-2.479T9 3.5t2.479 1.021T12.5 7v10q0 1.056.722 1.778T15 19.5t1.778-.722T17.5 17V9.116H16q-.213 0-.356-.144t-.144-.356v-3.5h1V4q0-.213.144-.356T17 3.5h2q.213 0 .356.144T19.5 4v1.116h1v3.5q0 .212-.144.356T20 9.116h-1.5V17q0 1.458-1.021 2.479T15 20.5t-2.479-1.021T11.5 17V7q0-1.056-.722-1.778T9 4.5t-1.778.722T6.5 7v7.885H8q.213 0 .356.143t.144.356v3.5h-1V20q0 .213-.144.356T7 20.5z"/>
</g>
</g>
<text x="90" y="62" font-family="sans-serif" font-weight="800" font-size="40" fill="#1E293B" letter-spacing="-1">
Port<tspan fill="#3B82F6">2</tspan>Internet
</text>
</svg>`;
            
            const el = document.createElement('textarea');
            el.value = svgCode;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            const feedback = document.getElementById('copy-feedback');
            feedback.classList.remove('hidden');
            setTimeout(() => {
                feedback.classList.add('hidden');
            }, 2000);
        }
    </script>
</body>
</html>
